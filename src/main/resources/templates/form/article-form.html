<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formMode == 'add'} ? 'Ajouter un article' : 'Modifier un article'">
        Formulaire article
    </title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">

            <div class="card shadow-sm">
                <div class="card-header" th:classappend="${formMode == 'add'} ? ' bg-primary text-white' : ' bg-warning'">
                    <h3 class="mb-0" th:text="${formMode == 'add'} ? 'Ajouter un article' : 'Modifier un article'">
                        Formulaire article
                    </h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/saveArticle(page=${page}, keyword=${keyword})}"
                          th:object="${article}"
                          method="post">

                        <!-- Champ caché pour garder l'id -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <input type="text"
                                   id="description"
                                   class="form-control"
                                   th:field="*{description}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>
                        </div>

                        <!-- Brand -->
                        <div class="mb-3">
                            <label for="brand" class="form-label">Brand</label>
                            <input type="text"
                                   id="brand"
                                   class="form-control"
                                   th:field="*{brand}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('brand')}"
                                 th:errors="*{brand}">
                            </div>
                        </div>

                        <!-- Price -->
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number"
                                   step="0.01"
                                   id="price"
                                   class="form-control"
                                   th:field="*{price}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}">
                            </div>
                        </div>

                        <!-- Boutons -->
                        <div class="d-flex justify-content-between">
                            <a class="btn btn-secondary"
                               th:href="@{/index(page=${page}, keyword=${keyword})}">
                                Annuler
                            </a>

                            <button type="submit" class="btn btn-success">
                                Enregistrer
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
