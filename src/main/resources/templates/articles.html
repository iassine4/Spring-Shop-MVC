<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des articles</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-10 offset-md-1">

            <!-- En-tête de la page -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">Liste des articles</h1>
                <a href="#" class="btn btn-primary">Add article</a>
            </div>

            <!-- Carte Bootstrap pour encadrer le tableau -->
            <div class="card shadow-sm">
                <div class="card-body">

                    <table class="table table-striped table-hover table-bordered align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>Id</th>
                            <th>Description</th>
                            <th>Brand</th>
                            <th>Price</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="article : ${articles}">
                            <td th:text="${article.id}"></td>
                            <td th:text="${article.description}"></td>
                            <td th:text="${article.brand}"></td>
                            <td th:text="${article.price}"></td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
